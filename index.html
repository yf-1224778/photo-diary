<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>写真日記</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 500px;
        margin: 0 auto;
        padding: 16px;
        background: #f7f5f2;
        color: #333;
        box-sizing: border-box;
      }

      /* 画像を親要素の幅に合わせて、はみ出さないようにする */
      #entries img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 8px;
        margin-bottom: 10px;
      }

      /* Spotifyプレーヤーも幅いっぱいに広げる */
      #entries iframe {
        width: 100%;
      }

      /* ボタンをタップしやすい大きさにする */
      button {
        background: #333;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        width: 100%;
      }

      h1 {
        text-align: center;
      }

      form {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        margin-bottom: 30px;
      }

      form div {
        margin-bottom: 12px;
      }

      label {
        display: block;
        margin-bottom: 4px;
        font-size: 14px;
        color: #666;
      }

      textarea,
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-family: inherit;
      }

      button {
        background: #333;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #555;
      }

      #entries div {
        background: white;
        padding: 16px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        margin-bottom: 20px;
      }

      #entries img {
        display: block;
        border-radius: 8px;
        margin-bottom: 10px;
      }

      #entries hr {
        display: none;
        /*カードで区切られているので線は不要　*/
      }
    </style>
  </head>

  <body>
    <h1>写真日記アプリ</h1>

    <div id="loginSection">
      <form id="loginForm">
        <div>
          <label for="email">メールアドレス:</label>
          <input type="email" id="email" required />
        </div>
        <div>
          <label for="password">パスワード:</label>
          <input type="password" id="password" required />
        </div>
        <button type="submit">ログイン</button>
      </form>
    </div>
    <div id="diarySection" style="display: none">
      <form id="diaryForm">
        <form id="diaryForm">
          <div>
            <label for="photo">写真:</label>
            <input type="file" id="photo" accept="image/*" />
          </div>

          <div>
            <label for="text">文章:</label>
            <textarea
              id="text"
              rows="4"
              cols="40"
              placeholder="今日のこと..."
            ></textarea>
          </div>

          <div>
            <label for="spotifyLink">Spotifyリンク</label>
            <input
              type="text"
              id="spotifyLink"
              placeholder="https://open.spotify.com/track/..."
            />
          </div>

          <button type="submit">投稿する</button>
        </form>

        <div id="entries"></div>
      </form>

      <div id="entries"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      const SUPABASE_URL = "https://boufjbfyusyjfkkppmlq.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvdWZqYmZ5dXN5amZra3BwbWxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NjQ2MDAsImV4cCI6MjEwMDA0MDYwMH0.OBVON50C0KtrXxEFS-apW2VBdC2FtKGbNMexeY6jSX8";
      const supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      const loginSection = document.getElementById("loginSection");
      const diarySection = document.getElementById("diarySection");
      const loginForm = document.getElementById("loginForm");

      // ログイン処理
      loginForm.addEventListener("submit", async function (event) {
        event.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password,
        });

        if (error) {
          alert("ログインに失敗しました: " + error.message);
          return;
        }

        showDiary();
      });

      // ログイン済みなら日記画面を表示、そうでなければログイン画面を表示
      function showDiary() {
        loginSection.style.display = "none";
        diarySection.style.display = "block";
        loadEntries();
      }

      function showLogin() {
        loginSection.style.display = "block";
        diarySection.style.display = "none";
      }

      // ページを開いたとき、すでにログイン済みかどうかを確認する
      async function checkLogin() {
        const { data } = await supabaseClient.auth.getSession();

        if (data.session) {
          showDiary();
        } else {
          showLogin();
        }
      }

      checkLogin();

      const form = document.getElementById("diaryForm");
      const entriesDiv = document.getElementById("entries");

      // ページを開いたときに、保存済みの投稿を読み込んで表示する
      async function loadEntries() {
        entriesDiv.innerHTML = ""; // 一旦画面を空にする(重複表示を防ぐため)

        const { data, error } = await supabaseClient
          .from("entries")
          .select("*")
          .order("created_at", { ascending: false }); // 新しい順に並べる

        if (error) {
          alert("読み込みに失敗しました: " + error.message);
          return;
        }

        data.forEach((row) => {
          renderEntry({
            text: row.text,
            spotifyLink: row.spotify_link,
            photo: row.photo_url,
          });
        });
      }

      //　1件分の投稿を画面に表示する関数（共通化）
      function renderEntry(data) {
        const entry = document.createElement("div");

        let photoHtml = "";
        if (data.photo) {
          photoHtml = `<img src="${data.photo}" width="300">`;
        }

        let spotifyEmbed = "";
        if (data.spotifyLink) {
          const embedLink = data.spotifyLink
            .replace("open.spotify.com/intl-ja/", "open.spotify.com/embed/")
            .replace(
              "open.spotify.com/track/",
              "open.spotify.com/embed/track/",
            );
          spotifyEmbed = `<iframe src="${embedLink}" width="300" height="80" allow="encrypted-media"></iframe>`;
        }

        entry.innerHTML = `
    ${photoHtml}
    <p>${data.text}</p>
    ${spotifyEmbed}
    <hr>
    `;

        entriesDiv.prepend(entry);
      }

      // 投稿を保存する関数
      async function saveEntry(text, spotifyLink, photoFile) {
        let photoUrl = null;

        if (photoFile) {
          const fileName = `${Date.now()}_${photoFile.name}`;

          const { data: uploadData, error: uploadError } =
            await supabaseClient.storage
              .from("photos")
              .upload(fileName, photoFile);

          if (uploadError) {
            alert("写真のアップロードに失敗しました: " + uploadError.message);
            return;
          }

          // アップロードした写真の公開URLを取得する
          const { data: urlData } = supabaseClient.storage
            .from("photos")
            .getPublicUrl(fileName);

          photoUrl = urlData.publicUrl;
        }

        const { error: insertError } = await supabaseClient
          .from("entries")
          .insert({
            text: text,
            spotify_link: spotifyLink,
            photo_url: photoUrl,
          });

        if (insertError) {
          alert("保存に失敗しました: " + insertError.message);
          return;
        }

        loadEntries(); // 保存できたら、一覧を読み込み直して画面に反映する
      }

      form.addEventListener("submit", async function (event) {
        event.preventDefault();

        const text = document.getElementById("text").value;
        const spotifyLink = document.getElementById("spotifyLink").value;
        const photoFile = document.getElementById("photo").files[0];

        await saveEntry(text, spotifyLink, photoFile);

        form.reset();
      });
    </script>
  </body>
</html>
